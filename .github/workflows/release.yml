name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create release as draft"
        type: boolean
        default: false
        required: false
      as-release:
        description: "Force stable version generation (--as-release)"
        type: boolean
        default: true
        required: false
      publish-crate:
        description: "Publish to crates.io"
        type: boolean
        default: true
        required: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rust-trx

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.SemVer }}
      pre_release_label: ${{ steps.version.outputs.PreReleaseLabel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Determine Version
        id: version
        run: |
          cargo install git-versioner --locked
          if [[ "${{ github.event.inputs.as-release }}" == "true" ]]; then
            git-versioner --as-release
          else
            git-versioner
          fi

      - name: Print calculated version
        run: |
          echo "Calculated SemVer: ${{ steps.version.outputs.SemVer }}"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: determine-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - determine-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: windows-latest
            target: i686-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" "dist/${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
    needs:
      - determine-version
      - build
      - test
    if: github.event.inputs.publish-crate == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set crate version
        run: |
          cargo install cargo-edit --locked --no-default-features --features set-version
          cargo set-version "${{ needs.determine-version.outputs.semver }}"

      - name: Publish to crates.io
        run: cargo publish --token "${{ secrets.CRATES_IO_TOKEN }}" --allow-dirty

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions: write-all
    needs:
      - determine-version
      - build
      - test
      - publish-crate
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.publish-crate.result == 'success' || needs.publish-crate.result == 'skipped')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.semver }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' }}
          prerelease: ${{ needs.determine-version.outputs.pre_release_label != '' }}
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
